name: Bazaar Printing E2E Tests

on:
  # ─── Scheduled runs ───────────────────────────────────────────────
  schedule:
    - cron: '0 */6 * * *'    # Every 6 hours
    - cron: '0 9 * * 1-5'    # Weekdays at 9 AM UTC (2 AM LA time)

  # ─── On every push to master ────────────────────────────────────────
  push:
    branches: [master]

  # ─── Manual trigger from GitHub UI ───────────────────────────────
  workflow_dispatch:
    inputs:
      suite:
        description: 'Test suite to run (all / smoke / desktop / mobile)'
        required: false
        default: 'all'

jobs:
  test:
    name: E2E Tests (${{ matrix.shard }})
    runs-on: ubuntu-latest
    timeout-minutes: 30

    strategy:
      fail-fast: false
      matrix:
        shard: [1/2, 2/2]   # Run in parallel across 2 workers

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps

      - name: Run tests
        run: |
          SUITE="${{ github.event.inputs.suite || 'all' }}"
          if [ "$SUITE" = "smoke" ]; then
            npx playwright test --grep @smoke --shard=${{ matrix.shard }}
          elif [ "$SUITE" = "desktop" ]; then
            npx playwright test --project=desktop-chrome --project=desktop-firefox --project=desktop-safari --shard=${{ matrix.shard }}
          elif [ "$SUITE" = "mobile" ]; then
            npx playwright test --project=mobile-ios --project=mobile-android --project=mobile-ipad --shard=${{ matrix.shard }}
          else
            npx playwright test --shard=${{ matrix.shard }}
          fi
        env:
          TEST_USER_EMAIL: ${{ secrets.TEST_USER_EMAIL }}
          TEST_USER_PASSWORD: ${{ secrets.TEST_USER_PASSWORD }}
          CI: true

      - name: Upload Playwright report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report-${{ matrix.shard }}
          path: playwright-report/
          retention-days: 14

      - name: Upload test results JSON
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-results-json-${{ matrix.shard }}
          path: dashboard/results/latest.json
          retention-days: 14

  # ─── Merge shards + deploy dashboard ──────────────────────────────
  publish-dashboard:
    name: Publish Dashboard
    runs-on: ubuntu-latest
    needs: test
    if: always()   # Run even if tests fail — we always want the dashboard updated

    permissions:
      contents: write   # Needed to push to gh-pages

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Download all result artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: test-results-json-*
          path: artifacts/

      - name: Merge shard results & collect history
        run: |
          # Merge the two shard JSONs into one latest.json
          node -e "
            const fs = require('fs');
            const path = require('path');
            const files = fs.readdirSync('artifacts/', { recursive: true })
              .filter(f => f.endsWith('latest.json'))
              .map(f => path.join('artifacts/', f));
            
            if (files.length === 0) { console.log('No result files found'); process.exit(0); }
            
            const merged = { suites: [] };
            for (const f of files) {
              try {
                const data = JSON.parse(fs.readFileSync(f, 'utf8'));
                merged.suites.push(...(data.suites || []));
              } catch(e) { console.warn('Could not parse', f, e.message); }
            }

            fs.mkdirSync('dashboard/results', { recursive: true });
            fs.writeFileSync('dashboard/results/latest.json', JSON.stringify(merged, null, 2));
            console.log('Merged', files.length, 'shard(s)');
          "

          # Pull existing history from gh-pages if available
          git fetch origin gh-pages 2>/dev/null && \
            git checkout origin/gh-pages -- dashboard/results/history.json 2>/dev/null || true
          
          node scripts/collect-results.js

      - name: Copy dashboard files
        run: |
          mkdir -p gh-pages-out
          cp dashboard/index.html gh-pages-out/
          cp dashboard/data.js gh-pages-out/
          # Preserve history
          mkdir -p gh-pages-out/results
          cp dashboard/results/history.json gh-pages-out/results/ 2>/dev/null || true

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./gh-pages-out
          keep_files: false
          commit_message: 'chore: update test dashboard [${{ github.run_id }}]'
